<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte Credits | Assignments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <!-- Flatpickr Dark Theme override -->
    <link id="flatpickr-dark" rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/dark.css" disabled>

    <style>
        :root {
            /* Indigo/Slate Premium Theme */
            --indigo-600: #4f46e5;
            --indigo-500: #6366f1;
            --indigo-400: #818cf8;
            --cyan-500: #06b6d4;
            --cyan-400: #22d3ee;
            
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --slate-100: #f1f5f9;
            --slate-50: #f8fafc;

            /* Light Theme (Default) */
            --bg-grad-1: var(--slate-50);
            --bg-grad-2: #e2e8f0;
            --bg-grad-3: #cbd5e1;
            --bg-grad-4: var(--slate-100);

            --text-main: var(--slate-900);
            --text-muted: var(--slate-700);
            --primary: var(--indigo-600);
            --secondary: var(--cyan-500);
            
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);

            --input-bg: #ffffff;
            --input-border: rgba(15, 23, 42, 0.15);

            --success: #16a34a;
            --danger: #ef4444;
            
            --err-bg: rgba(239, 68, 68, 0.1);
            --err-border: #fca5a5;
            --err-hover: #fecaca;
        }

        body.dark-mode {
            /* Dark Theme Elements */
            --bg-grad-1: #020617;
            --bg-grad-2: var(--slate-900);
            --bg-grad-3: #172033;
            --bg-grad-4: #0a0f1d;

            --text-main: var(--slate-50);
            --text-muted: var(--slate-400);
            
            --primary: var(--indigo-500);
            --secondary: var(--cyan-400);

            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(99, 102, 241, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);

            --input-bg: rgba(15, 23, 42, 0.8);
            --input-border: rgba(99, 102, 241, 0.3);

            --success: #4ade80;
            --danger: #f87171;

            --err-bg: rgba(248, 113, 113, 0.1);
            --err-border: rgba(248, 113, 113, 0.3);
            --err-hover: rgba(248, 113, 113, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-4));
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-main);
            padding-bottom: 50px;
            transition: color 0.4s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.4s ease, border-color 0.4s ease;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--text-main), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            text-decoration: none;
        }

        .theme-toggle {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-right: 15px;
        }

        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }

        /* --- FORM PANEL --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: var(--glass-shadow);
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .form-title {
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 900;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--glass-border);
            padding-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: var(--text-main);
            font-size: 0.8rem;
            margin-bottom: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
            font-weight: 500;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
            background: var(--input-bg);
        }

        #dueDate { cursor: pointer; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            background: var(--indigo-500);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }


        /* --- ASSIGNMENT LIST --- */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .list-header h2 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin: 0;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .assignments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .assign-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .assign-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.15);
        }

        body.dark-mode .assign-card:hover { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }

        .card-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 800;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-bottom: 12px;
            width: fit-content;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-main);
            line-height: 1.3;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .card-range-info {
            font-size: 0.85rem;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-range-info span { font-family: 'ui-monospace', monospace; }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
            margin-top: auto;
        }

        .card-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Button Styles */
        .btn-pod {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }
        .btn-pod:hover {
            background: var(--indigo-500);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .btn-edit {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }
        .btn-edit:hover {
            background: rgba(15, 23, 42, 0.05);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        body.dark-mode .btn-edit:hover { background: rgba(255, 255, 255, 0.05); }

        .btn-del {
            background: var(--err-bg);
            color: var(--danger);
            border: 1px solid var(--err-border);
        }
        .btn-del:hover {
            background: var(--err-hover);
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .glass-panel { position: static; order: -1; }
        }
    </style>
</head>

<body>

    <nav class="anim">
        <div style="display:flex;align-items:center;">
            <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>
            <div class="logo" onclick="window.location.href='index.html'">BYTE CREDITS</div>
        </div>
        <a href="teacher_dashboard.html" class="back-btn">← Back to Dashboard</a>
    </nav>

    <div class="container">

        <div class="glass-panel anim">
            <div class="form-title" id="formHeader">Create New Assignment</div>
            <form id="assignForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="editIndex" value="-1">

                <div class="input-group">
                    <label>Subject</label>
                    <select id="subject" required>
                        <option value="" disabled selected>Select Subject</option>
                        <option value="Web Technologies">Web Technologies</option>
                        <option value="Compiler Design">Compiler Design</option>
                        <option value="Computer Networks">Computer Networks</option>
                        <option value="Software Engineering">Software Engineering</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Assignment Title</label>
                    <input type="text" id="title" placeholder="e.g. Unit 2 Case Study" required>
                </div>

                <div class="input-group">
                    <label>Due Date</label>
                    <input type="text" id="dueDate" placeholder="Select Date..." required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Pin No Range</label>
                        <input type="text" id="pinRange" placeholder="e.g. 501-560" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Skip Nos</label>
                        <input type="text" id="skipNos" placeholder="e.g. 505, 512">
                    </div>
                </div>

                <div class="input-group">
                    <label>Max Team Size</label>
                    <input type="number" id="teamSize" min="1" max="10" value="1" required>
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="desc" rows="4" placeholder="Enter instructions..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Assign Task</button>
            </form>
        </div>

        <div class="anim" style="animation-delay: 0.2s;">
            <div class="list-header">
                <h2>Active Assignments</h2>
            </div>
            <div class="assignments-grid" id="assignGrid"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        // --- Theme Toggle Logic ---
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            body.classList.toggle('dark-mode');
            
            const fpDark = document.getElementById('flatpickr-dark');

            if (body.classList.contains('dark-mode')) {
                themeBtn.innerText = '☀️';
                localStorage.setItem('theme', 'dark');
                if (fpDark) fpDark.disabled = false;
            } else {
                themeBtn.innerText = '🌙';
                localStorage.setItem('theme', 'light');
                if (fpDark) fpDark.disabled = true;
            }
        }

        function initTheme() {
            const fpDark = document.getElementById('flatpickr-dark');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                if (document.getElementById('theme-btn')) {
                    document.getElementById('theme-btn').innerText = '☀️';
                }
                if (fpDark) fpDark.disabled = false;
            } else {
                if (fpDark) fpDark.disabled = true;
            }
        }
        initTheme();

        // Initialize Custom Calendar
        flatpickr("#dueDate", {
            dateFormat: "Y-m-d",
            minDate: "today"
        });

        // Dummy Data
        let assignments = [
            {
                id: 1,
                subject: "Web Technologies",
                title: "Build a Portfolio Website",
                date: "2024-12-20",
                teamSize: 1,
                pinRange: "501-565",
                skipNos: "",
                desc: "Create a responsive portfolio using HTML, CSS, and JS."
            },
            {
                id: 2,
                subject: "Compiler Design",
                title: "Lexical Analyzer",
                date: "2024-12-25",
                teamSize: 2,
                pinRange: "501-565",
                skipNos: "505, 523",
                desc: "Implement a Lexical Analyzer using C/C++ or Python."
            }
        ];

        const grid = document.getElementById('assignGrid');
        const formHeader = document.getElementById('formHeader');
        const submitBtn = document.getElementById('submitBtn');
        const editIndexInput = document.getElementById('editIndex');

        // Render Cards
        function renderAssignments() {
            grid.innerHTML = "";
            assignments.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'assign-card anim';
                card.style.animationDelay = `${index * 0.1}s`;

                let teamIcon = item.teamSize > 1 ? "👥 Team of " + item.teamSize : "👤 Individual";

                // Display logic for skips
                let skipHtml = item.skipNos ? `<span style="color: var(--danger); font-weight: 700;">🚫 Skip: ${item.skipNos}</span>` : "";

                card.innerHTML = `
                        <div class="card-badge">${item.subject}</div>
                        <div class="card-title">${item.title}</div>
                        
                        <div class="card-meta">
                            <span>📅 ${item.date}</span>
                            <span>${teamIcon}</span>
                        </div>

                        <div class="card-range-info">
                            <span style="color: var(--text-main); font-weight: 700;">🆔 Range: ${item.pinRange}</span>
                            ${skipHtml}
                        </div>

                        <div class="card-desc">${item.desc}</div>
                        
                        <div class="card-actions">
                            <button class="card-btn btn-pod" onclick="generatePods(${index})">✨ Generate PODs</button>
                            <button class="card-btn btn-edit" onclick="editAssignment(${index})">Edit</button>
                            <button class="card-btn btn-del" onclick="deleteAssignment(${index})">Delete</button>
                        </div>
                    `;
                grid.appendChild(card);
            });
        }

        // Generate PODs Logic
        function generatePods(index) {
            const item = assignments[index];
            alert(`Generating PODs (Problem of the Day) for assignment:\n"${item.title}"...\n\n✅ PODs Generated Successfully!`);
        }

        // Add / Update
        function handleFormSubmit(e) {
            e.preventDefault();

            const subject = document.getElementById('subject').value;
            const title = document.getElementById('title').value;
            const date = document.getElementById('dueDate').value;
            const pinRange = document.getElementById('pinRange').value;
            const skipNos = document.getElementById('skipNos').value;
            const teamSize = document.getElementById('teamSize').value;
            const desc = document.getElementById('desc').value;
            const editIdx = parseInt(editIndexInput.value);

            if (editIdx === -1) {
                assignments.unshift({ id: Date.now(), subject, title, date, pinRange, skipNos, teamSize, desc });
                alert("Assignment Created Successfully!");
            } else {
                assignments[editIdx] = { ...assignments[editIdx], subject, title, date, pinRange, skipNos, teamSize, desc };
                alert("Assignment Updated Successfully!");
                formHeader.innerText = "Create New Assignment";
                submitBtn.innerText = "Assign Task";
                editIndexInput.value = -1;
            }

            document.getElementById('assignForm').reset();
            renderAssignments();
        }

        // Edit
        function editAssignment(index) {
            const item = assignments[index];
            document.getElementById('subject').value = item.subject;
            document.getElementById('title').value = item.title;
            document.getElementById('dueDate').value = item.date;
            document.getElementById('pinRange').value = item.pinRange;
            document.getElementById('skipNos').value = item.skipNos || "";
            document.getElementById('teamSize').value = item.teamSize;
            document.getElementById('desc').value = item.desc;

            editIndexInput.value = index;
            formHeader.innerText = "Edit Assignment";
            submitBtn.innerText = "Update Assignment";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete
        function deleteAssignment(index) {
            if (confirm("Delete this assignment?")) {
                assignments.splice(index, 1);
                renderAssignments();
            }
        }

        renderAssignments();
    </script>
</body>
</html>
