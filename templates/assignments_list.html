<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte Credits | My Assignments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Indigo/Slate Premium Theme */
            --indigo-600: #4f46e5;
            --indigo-500: #6366f1;
            --cyan-500: #06b6d4;
            --cyan-400: #22d3ee;
            
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-400: #94a3b8;
            --slate-100: #f1f5f9;
            --slate-50: #f8fafc;

            /* Light Theme (Default) */
            --bg-grad-1: var(--slate-50);
            --bg-grad-2: #e2e8f0;
            --bg-grad-3: #cbd5e1;
            --bg-grad-4: var(--slate-100);

            --text-main: var(--slate-900);
            --text-muted: var(--slate-700);
            --primary: var(--indigo-600);
            
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);

            --success: #16a34a;
            --warning: #ca8a04;
        }

        body.dark-mode {
            /* Dark Theme Elements */
            --bg-grad-1: #020617;
            --bg-grad-2: var(--slate-900);
            --bg-grad-3: #172033;
            --bg-grad-4: #0a0f1d;

            --text-main: var(--slate-50);
            --text-muted: var(--slate-400);
            
            --primary: var(--indigo-500);

            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(99, 102, 241, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);

            --success: #4ade80;
            --warning: #facc15;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-4));
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-main);
            padding-bottom: 50px;
            transition: color 0.4s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.4s ease, border-color 0.4s ease;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--text-main), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            text-decoration: none;
        }

        .theme-toggle {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-right: 15px;
        }

        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        /* --- CONTAINER --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- HEADER & SEARCH --- */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title h2 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .search-box {
            position: relative;
            width: 320px;
        }

        .search-box input {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            padding: 14px 16px 14px 44px;
            border-radius: 30px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: 0.3s;
            box-shadow: var(--glass-shadow);
        }
        
        body.dark-mode .search-box input { background: rgba(15, 23, 42, 0.8); border-color: rgba(99, 102, 241, 0.3); }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* --- GRID --- */
        .assignments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* --- CARDS --- */
        .assign-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .assign-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.15);
        }
        body.dark-mode .assign-card:hover { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }

        .status-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--warning);
        }

        .assign-card.submitted .status-strip { background: var(--success); }

        .subject-badge {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: inline-block;
            width: fit-content;
            text-transform: uppercase;
        }

        .task-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            font-weight: 600;
        }

        .meta-item { display: flex; align-items: center; gap: 6px; }

        .task-desc {
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .btn-open {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            background: var(--primary);
            color: #ffffff;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-open:hover {
            transform: translateY(-2px);
            background: var(--indigo-500);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-completed {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
            border: 1px solid rgba(22, 163, 74, 0.3);
            cursor: default;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; align-items: flex-start; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="anim">
        <div style="display:flex;align-items:center;">
            <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>
            <a href="/student-dashboard" class="logo">BYTE CREDITS</a>
        </div>
        <a href="/student-dashboard" class="back-btn">← Back to Dashboard</a>
    </nav>

    <div class="container">

        <div class="page-header anim">
            <div class="page-title">
                <h2>My Assignments</h2>
                <p>{{ name }} · Track pending tasks and submit your work.</p>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search subject or title..." onkeyup="filterAssignments()">
            </div>
        </div>

        <div class="assignments-grid" id="assignGrid"></div>

    </div>

    <script>
        // --- Theme Toggle Logic ---
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeBtn.innerText = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeBtn.innerText = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                if (document.getElementById('theme-btn')) {
                    document.getElementById('theme-btn').innerText = '☀️';
                }
            }
        }
        initTheme();

        // --- Assignments Logic ---
        let assignments = [
            {
                id: 1, subject: "Web Technologies", title: "Build a Portfolio Website",
                date: "2024-12-20", teamSize: 1,
                desc: "Create a responsive portfolio using HTML, CSS, and JS.", status: "pending"
            },
            {
                id: 2, subject: "Computer Networks", title: "Subnetting Project",
                date: "2024-12-18", teamSize: 4,
                desc: "Design a network topology for a 3-floor building.", status: "pending"
            }
        ];

        const grid = document.getElementById('assignGrid');

        function renderAssignments(data = assignments) {
            grid.innerHTML = "";

            data.forEach((item, index) => {
                const card = document.createElement('div');
                const isSubmitted = item.status === 'submitted';

                card.className = `assign-card anim ${isSubmitted ? 'submitted' : ''}`;
                card.style.animationDelay = `${index * 0.1}s`;

                let teamIcon = item.teamSize > 1 ? "👥 Team of " + item.teamSize : "👤 Individual";

                // Button redirects to details page with assignment ID
                let buttonHTML = isSubmitted
                    ? `<div class="btn-completed">✔ Submitted</div>`
                    : `<a href="/assignment-details?id=${item.id}" class="btn-open">📂 Open Assignment</a>`;

                card.innerHTML = `
                    <div class="status-strip"></div>
                    <div class="subject-badge">${item.subject}</div>
                    <div class="task-title">${item.title}</div>
                    <div class="meta-row">
                        <div class="meta-item">📅 Due: ${item.date}</div>
                        <div class="meta-item">${teamIcon}</div>
                    </div>
                    <div class="task-desc">${item.desc}</div>
                    ${buttonHTML}
                `;
                grid.appendChild(card);
            });
        }

        function filterAssignments() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = assignments.filter(item =>
                item.title.toLowerCase().includes(query) || item.subject.toLowerCase().includes(query)
            );
            renderAssignments(filtered);
        }

        renderAssignments();
    </script>

</body>
</html>
